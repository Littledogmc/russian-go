# ============================================================
# RussianGo 后端配置 (Redis)
# 需要先启动本地 Redis 服务: cd redis && redis-server redis.conf
# ============================================================
server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 0
